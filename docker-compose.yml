name: plimsoll

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: plimsoll
      POSTGRES_USER: plimsoll
      POSTGRES_PASSWORD: plimsoll
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plimsoll -d plimsoll"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: plimsoll
      DB_PASSWORD: plimsoll
      DB_NAME: plimsoll
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
    ports:
      - "${PGBOUNCER_PORT:-16543}:5432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql://plimsoll:plimsoll@postgres:5432/plimsoll
      REDIS_URL: redis://redis:6379/0
      QUEUE_BACKEND: pgmq
      KB_BACKEND: disabled
      UPLOAD_BACKEND: disk
      AUTO_CREATE_TABLES: "true"
      DOCUMENT_ANALYSIS_USE_CREWAI: "false"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      PUBLIC_WS_BASE_URL: ws://localhost:${BACKEND_PORT:-18000}
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "worker.main"]
    healthcheck:
      disable: true
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql://plimsoll:plimsoll@postgres:5432/plimsoll
      REDIS_URL: redis://redis:6379/0
      QUEUE_BACKEND: pgmq
      KB_BACKEND: disabled
      UPLOAD_BACKEND: disk
      AUTO_CREATE_TABLES: "false"
      DOCUMENT_ANALYSIS_USE_CREWAI: "false"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-18000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    profiles:
      - frontend

volumes:
  postgres_data:
  redis_data:
  backend_data:
  frontend_node_modules:
